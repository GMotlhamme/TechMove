version: "3.9"

services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "TechMove@2026!"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  glms-backend-api:
    build:
      context: .
      dockerfile: TechMoveBackend/Dockerfile
    container_name: glms-backend-api
    depends_on:
      - sql-server-db
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=EnterpriseTechmoveDB;User Id=sa;Password=TechMove@2026!;TrustServerCertificate=True;"
    ports:
      - "5001:8080"

  glms-frontend-web:
    build:
      context: .
      dockerfile: TechMove/Dockerfile
    container_name: glms-frontend-web
    depends_on:
      - glms-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      BackendApi__BaseUrl: "http://glms-backend-api:8080/"
    ports:
      - "5000:8080"

volumes:
  sql_data: